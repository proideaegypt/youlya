[mcp_servers.github]
command = "github-mcp-server"
args = []
env = { GITHUB_TOKEN = "${GITHUB_TOKEN}" }

[mcp_servers.supabase_readonly]
command = "supabase-mcp-server"
args = ["--read-only"]
env = { SUPABASE_ACCESS_TOKEN = "${SUPABASE_ACCESS_TOKEN}" }

[mcp_servers.docs]
command = "docs-mcp-server"
args = []

